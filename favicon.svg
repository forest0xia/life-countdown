<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3b5c"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3b5c"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="#0e1029"/>
  <g transform="translate(256,256)">
    <!-- Top bar -->
    <rect x="-90" y="-170" width="180" height="20" rx="10" fill="url(#g)"/>
    <!-- Bottom bar -->
    <rect x="-90" y="150" width="180" height="20" rx="10" fill="url(#g)"/>
    <!-- Upper glass -->
    <path d="M-75,-150 C-75,-150 -75,-40 0,0" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="5" stroke-linecap="round"/>
    <path d="M75,-150 C75,-150 75,-40 0,0" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="5" stroke-linecap="round"/>
    <!-- Lower glass -->
    <path d="M-75,150 C-75,150 -75,40 0,0" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="5" stroke-linecap="round"/>
    <path d="M75,150 C75,150 75,40 0,0" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="5" stroke-linecap="round"/>
    <!-- Sand top (little remaining) -->
    <path d="M-50,-150 C-50,-150 -50,-90 0,-50 C50,-90 50,-150 50,-150 Z" fill="url(#s)" opacity="0.25"/>
    <!-- Sand bottom (mostly elapsed) -->
    <path d="M-70,150 C-70,150 -70,50 0,20 C70,50 70,150 70,150 Z" fill="url(#s)" opacity="0.65"/>
    <!-- Stream -->
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#ff3b5c" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Glow at center -->
    <circle cx="0" cy="0" r="8" fill="#ff3b5c" opacity="0.4"/>
  </g>
</svg>
